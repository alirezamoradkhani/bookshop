services:
  postgres:
    image: postgres:16
    container_name: fastapi-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fastapi-redis
    restart: always
    ports:
      - "6380:6379"

  app:
    build: .
    container_name: fastapi-app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

    # 👇 مهم
    env_file:
      - .env

    volumes:
      - .:/app

    # 👇 مهم برای auto reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  
  worker:
    build: .
    container_name: fastapi-worker
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    command: python -m app.workers.main

volumes:
  pgdata: